name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup Dalamud libs for build
        run: |
          DALAMUD_DIR="$RUNNER_WORKSPACE/dalamud_libs"
          mkdir -p "$DALAMUD_DIR"
          curl -sL -o /tmp/dalamud.zip "https://github.com/goatcorp/dalamud-distrib/raw/main/latest.zip"
          unzip -q -o /tmp/dalamud.zip -d "$DALAMUD_DIR"
          echo "DALAMUD_HOME=$DALAMUD_DIR" >> $GITHUB_ENV

      - name: Build
        run: dotnet build SaddlebagExchange/SaddlebagExchange.csproj -c Release --no-incremental -o "${{ github.workspace }}/release_output"

      - name: Create plugin zip
        run: |
          # Installer expects files at zip root (no folder). DLL/icon go to -o dir; Dalamud SDK often writes manifest to project bin/Release.
          STAGING="release_staging"
          BIN="${{ github.workspace }}/release_output"
          mkdir -p "$STAGING"
          # Manifest: SDK/GenerateManifest may write to project bin/Release instead of -o; copy from there or generate from repo.json
          if [ -f "SaddlebagExchange/bin/Release/net9.0-windows/manifest.json" ]; then
            cp "SaddlebagExchange/bin/Release/net9.0-windows/manifest.json" "$BIN/"
          elif [ ! -f "$BIN/manifest.json" ]; then
            jq -c '.[0] | del(.DownloadLinkInstall, .ApplicableVersion, .DownloadLinkTesting, .DownloadLinkUpdate, .DownloadCount, .LastUpdated, .IsHide, .IsTestingExclusive) | . + {LoadRequiredState: 0}' repo.json > "$BIN/manifest.json"
          fi
          cp "$BIN/SaddlebagExchange.dll" "$STAGING/"
          cp "$BIN/icon.png" "$STAGING/"
          cp "$BIN/manifest.json" "$STAGING/"
          cd "$STAGING" && zip -r ../SaddlebagExchange.zip . && cd ..
          unzip -l SaddlebagExchange.zip

      - name: Create Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: SaddlebagExchange.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
